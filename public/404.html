<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Eventify</title>
    <script>
      // GitHub Pages SPA redirect trick.
      // Encodes the current URL as a query param and sends it to index.html,
      // where it gets decoded and pushed into the browser history.
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 2).join('/') +
        '/?p=' + encodeURIComponent(l.pathname.slice(1) + l.search) +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
